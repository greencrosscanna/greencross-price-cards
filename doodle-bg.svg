<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- flat tattoo-flash icons -->
    <path id="d-spark" d="M0,-22 C3,-7 7,-3 22,0 C7,3 3,7 0,22 C-3,7 -7,3 -22,0 C-7,-3 -3,-7 0,-22 Z"/>
    <path id="d-bolt" d="M5,-20 L-10,4 L-1,4 L-6,20 L12,-6 L3,-6 Z"/>
    <g id="d-spade">
      <path d="M0,-20 C-16,-3 -20,7 -11,13 C-6,16 -1,13 0,9 C1,13 6,16 11,13 C20,7 16,-3 0,-20 Z"/>
      <path d="M0,7 L-6,22 L6,22 Z"/>
    </g>
    <path id="d-star" d="M0,-20 L5.9,-6.2 L20.7,-6.2 L8.4,2.4 L13,16.2 L0,7.6 L-13,16.2 L-8.4,2.4 L-20.7,-6.2 L-5.9,-6.2 Z"/>
    <path id="d-cross" d="M-3.5,-14 H3.5 V-3.5 H14 V3.5 H3.5 V14 H-3.5 V3.5 H-14 V-3.5 H-3.5 Z"/>
    <g id="d-cloud">
      <circle cx="-15" cy="3" r="12"/><circle cx="4" cy="-5" r="16"/><circle cx="21" cy="4" r="11"/>
      <rect x="-27" y="3" width="50" height="13" rx="6.5"/>
    </g>
    <path id="d-skull" fill-rule="evenodd" d="M-18,-4 a18,17 0 0 1 36,0 c0,7 -4,12 -9,14 l0,5 a3,3 0 0 1 -6,0 a3,3 0 0 1 -6,0 a3,3 0 0 1 -6,0 l0,-5 c-5,-2 -9,-7 -9,-14 Z M-8,-4 a4.5,4.5 0 1 0 9,0 a4.5,4.5 0 1 0 -9,0 Z M2,-4 a4.5,4.5 0 1 0 9,0 a4.5,4.5 0 1 0 -9,0 Z M-2,5 l-2.5,5 h5 Z"/>

    <!-- illustrated line-art objects -->
    <g id="d-joint" fill="none" stroke="#e9e1cd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22,5 L15,-2"/>
      <path d="M-21,8 L15,1"/>
      <path d="M-22,5 L-27,4 M-21,8 L-27,7"/>
      <path d="M15,-2 L20.5,-1 L19,3.2 L15,1 Z" fill="#e9e1cd"/>
      <path d="M23,-2 l3.5,-1.5 M23,1.5 l3.5,1.5" stroke-width="1.4"/>
      <path d="M22,-5 q6,-4 1,-11 q-5,-5 1,-11" stroke-width="1.7"/>
    </g>

    <g id="d-bong" fill="none" stroke="#e9e1cd" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-7,-22 L7,-22 L4.5,-15 L4.5,-1 a13,13 0 1 1 -9,0 L-4.5,-15 Z"/>
      <path d="M-12.3,5 a13,13 0 0 0 24.6,0" stroke-width="1.5"/>
      <path d="M-8,7 L-20,13 L-18,17 L-7.5,12" />
      <circle cx="-2" cy="11" r="1.4" fill="#e9e1cd" stroke="none"/>
      <circle cx="3" cy="13.5" r="1.1" fill="#e9e1cd" stroke="none"/>
    </g>

    <!-- gummy: 3D sugar-dusted cube -->
    <g id="d-gummy" fill="none" stroke="#e9e1cd" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0,-19 L16,-10 L0,-1 L-16,-10 Z"/>
      <path d="M16,-10 L16,7 L0,16 L0,-1"/>
      <path d="M-16,-10 L-16,7 L0,16 L0,-1"/>
      <path d="M-9,-8.5 l3.5,2 M-11,-6 l2,1.2" stroke-width="1.4"/>
      <circle cx="9" cy="2" r="1" fill="#e9e1cd" stroke="none"/>
      <circle cx="-8" cy="3" r="1" fill="#e9e1cd" stroke="none"/>
    </g>

    <!-- beverage can: line-art with rim, tab, label band -->
    <g id="d-can" fill="none" stroke="#e9e1cd" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-9,-12 a9,3.5 0 0 1 18,0 l0,24 a9,3.5 0 0 1 -18,0 Z"/>
      <ellipse cx="0" cy="-12" rx="9" ry="3.5"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="1.7" stroke-width="1.3"/>
      <path d="M-9,-1 h18 M-9,6 h18" stroke-width="1.4"/>
      <path d="M-5,2.5 h3.5 M1.5,2.5 h3.5" stroke-width="1.2"/>
      <path d="M6,-7 l0,17" stroke-width="1.2"/>
    </g>

    <!-- cannabis leaf: line-art leaflets with center veins -->
    <g id="d-leaflet" fill="none" stroke="#e9e1cd" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0,16 C-3.5,4 -2.5,-12 0,-22 C2.5,-12 3.5,4 0,16 Z"/>
      <path d="M0,13 L0,-18" stroke-width="1.2"/>
    </g>
    <g id="d-leaf">
      <use href="#d-leaflet" transform="rotate(72 0 16) translate(0,16) scale(0.52) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(-72 0 16) translate(0,16) scale(0.52) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(48 0 16) translate(0,16) scale(0.72) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(-48 0 16) translate(0,16) scale(0.72) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(24 0 16) translate(0,16) scale(0.9) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(-24 0 16) translate(0,16) scale(0.9) translate(0,-16)"/>
      <use href="#d-leaflet" transform="rotate(0 0 16)"/>
      <path d="M0,16 L0,27" stroke="#e9e1cd" stroke-width="2" stroke-linecap="round"/>
    </g>
  </defs>
  <g fill="#e9e1cd" opacity="0.8">
    <use href="#d-skull"  transform="translate(112,122) scale(1.15)"/>
    <use href="#d-spark"  transform="translate(302,100) scale(1.2)"/>
    <use href="#d-leaf"   transform="translate(492,138) scale(1.1)"/>
    <use href="#d-joint"  transform="translate(128,300) rotate(-20) scale(1.1)"/>
    <use href="#d-bong"   transform="translate(320,310) scale(1.0)"/>
    <use href="#d-gummy"  transform="translate(516,308) scale(1.05)"/>
    <use href="#d-can"    transform="translate(112,480) scale(1.05)"/>
    <use href="#d-star"   transform="translate(300,468) scale(1.0)"/>
    <use href="#d-spade"  transform="translate(516,492) scale(0.95)"/>
    <use href="#d-cloud"  transform="translate(432,560) scale(1.0)"/>
    <use href="#d-bolt"   transform="translate(190,560) rotate(8) scale(1.0)"/>
    <use href="#d-cross"  transform="translate(560,212) scale(0.9)"/>
    <use href="#d-spark"  transform="translate(40,236) scale(0.55)"/>
    <circle cx="252" cy="200" r="3.5"/><circle cx="402" cy="392" r="4"/>
    <circle cx="62" cy="396" r="3.5"/><circle cx="560" cy="402" r="3.5"/>
    <circle cx="246" cy="560" r="3.5"/>
  </g>
</svg>
